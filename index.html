<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>JEU-TTS · REACTION WOD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #00ffcc;
      --neon2: #ff003c;
      --bg: #0a0a0a;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ────────────────────────────────
       SCREENS
    ──────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .35s ease, transform .35s ease;
      opacity: 0; pointer-events: none; transform: scale(.96);
    }
    .screen.active {
      opacity: 1; pointer-events: all; transform: scale(1);
    }

    /* ────────────────────────────────
       WELCOME SCREEN
    ──────────────────────────────── */
    #screen-welcome {
      background: #0a0a0a;
      gap: 2rem;
      padding: 2rem;
    }
    .logo {
      font-size: clamp(3rem, 16vw, 6rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      text-align: center;
      background: linear-gradient(135deg, #ff6b00, #ff003c, #cc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,60,0,.4));
    }
    .subtitle {
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }

    .input-wrap {
      width: 100%; max-width: 360px;
      position: relative;
    }
    .blase-input {
      width: 100%;
      padding: 1rem 1.4rem;
      background: rgba(255,255,255,.06);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--white);
      outline: none;
      text-transform: uppercase;
      text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .blase-input::placeholder { color: rgba(255,255,255,.2); }
    .blase-input:focus {
      border-color: #ff6b00;
      box-shadow: 0 0 20px rgba(255,107,0,.3);
    }

    .btn-start {
      width: 100%; max-width: 360px;
      padding: 1.1rem;
      background: linear-gradient(135deg, #ff6b00, #ff003c);
      border: none;
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      cursor: pointer;
      box-shadow: 0 4px 30px rgba(255,60,0,.45);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-start:active { transform: scale(.97); box-shadow: 0 2px 15px rgba(255,60,0,.3); }

    .rules {
      font-size: .85rem;
      font-family: 'Barlow', sans-serif;
      color: rgba(255,255,255,.3);
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
      letter-spacing: .5px;
    }
    .rules span { color: rgba(255,255,255,.6); font-weight: 600; }

    /* ────────────────────────────────
       GAME SCREEN
    ──────────────────────────────── */
    #screen-game {
      padding: 0;
      background: #0a0a0a;
    }

    #game-area {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 67vh;
      background: linear-gradient(135deg, #cc00ff 0%, #ff003c 40%, #ff6b00 100%);
      overflow: hidden;
      cursor: pointer;
    }
    #game-area::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,.08), transparent 60%);
      pointer-events: none;
    }

    /* animated gradient shift */
    @keyframes gradShift {
      0%   { filter: hue-rotate(0deg); }
      50%  { filter: hue-rotate(30deg); }
      100% { filter: hue-rotate(0deg); }
    }
    #game-area.animating { animation: gradShift 4s ease-in-out infinite; }

    .target {
      position: absolute;
      width: 90px; height: 90px;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(4px);
      border: 3px solid rgba(255,255,255,.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      cursor: pointer;
      transform: translate(-50%, -50%) scale(0);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1);
      pointer-events: all;
      box-shadow: 0 0 30px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3);
    }
    .target.visible { transform: translate(-50%, -50%) scale(1); }
    .target:active { transform: translate(-50%, -50%) scale(.88); }

    /* NO REP flash */
    #norep-overlay {
      position: absolute; inset: 0;
      background: rgba(180,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .1s;
    }
    #norep-overlay.show { opacity: 1; }
    #norep-text {
      font-size: clamp(3rem, 18vw, 7rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 0 40px rgba(255,0,0,.8);
      animation: shake .25s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* HUD */
    #hud {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 33vh;
      background: #0d0d0d;
      border-top: 2px solid var(--neon);
      box-shadow: 0 -4px 30px rgba(0,255,204,.2);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .hud-block { text-align: center; flex: 1; }
    .hud-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-bottom: .3rem;
    }
    .hud-value {
      font-size: clamp(2.8rem, 12vw, 4.5rem);
      font-weight: 900;
      line-height: 1;
      color: var(--white);
    }
    #hud-time { color: var(--neon); }
    #hud-time.urgent { color: #ff003c; animation: pulse .5s ease infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: .5; } }

    .hud-divider {
      width: 1px; height: 60%;
      background: rgba(255,255,255,.1);
    }

    #hud-blase {
      font-size: clamp(.7rem, 3vw, .95rem);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-top: .3rem;
    }

    /* ────────────────────────────────
       RESULTS SCREEN
    ──────────────────────────────── */
    #screen-result {
      background: #0a0a0a;
      padding: 1.5rem;
      gap: 0;
      overflow-y: auto;
      justify-content: flex-start;
    }

    .result-header {
      width: 100%;
      text-align: center;
      padding: 2rem 0 1.5rem;
    }
    .result-tag {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: .5rem;
    }
    .result-name {
      font-size: clamp(2.5rem, 12vw, 4rem);
      font-weight: 900;
      color: var(--white);
      letter-spacing: -1px;
    }
    .result-score-wrap {
      display: flex; align-items: baseline; justify-content: center; gap: .5rem;
      margin: .5rem 0 2rem;
    }
    .result-score {
      font-size: clamp(5rem, 22vw, 8rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ff6b00, #ff003c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-pts {
      font-size: 1.5rem;
      font-weight: 700;
      color: rgba(255,255,255,.3);
      letter-spacing: 2px;
    }

    /* Leaderboard */
    .lb-title {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      text-align: center;
      margin-bottom: 1rem;
    }
    .lb-title span { color: var(--neon); }

    #leaderboard {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: .5rem;
      margin: 0 auto;
    }

    .lb-row {
      display: flex; align-items: center; gap: 1rem;
      padding: .8rem 1rem;
      background: rgba(255,255,255,.04);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.07);
      animation: rowIn .3s ease both;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .lb-row.rank-1 {
      background: rgba(255,215,0,.08);
      border-color: rgba(255,215,0,.25);
    }
    .lb-row.rank-2 { background: rgba(192,192,192,.06); border-color: rgba(192,192,192,.15); }
    .lb-row.rank-3 { background: rgba(205,127,50,.06); border-color: rgba(205,127,50,.15); }
    .lb-row.mine { border-color: rgba(0,255,204,.35); background: rgba(0,255,204,.06); }

    .lb-rank {
      font-size: 1.3rem;
      font-weight: 900;
      width: 2rem;
      text-align: center;
      color: rgba(255,255,255,.25);
    }
    .rank-1 .lb-rank { color: gold; }
    .rank-2 .lb-rank { color: silver; }
    .rank-3 .lb-rank { color: #cd7f32; }

    .lb-name {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--white);
    }
    .lb-score {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--white);
    }
    .lb-score-pts { font-size: .75rem; color: rgba(255,255,255,.3); }

    .lb-loading {
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,.3);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .btn-play-again {
      margin: 2rem auto 3rem;
      display: block;
      width: 100%; max-width: 360px;
      padding: 1.1rem;
      background: transparent;
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-play-again:active { background: rgba(255,255,255,.08); }

    /* countdown overlay before game starts */
    #countdown-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    #countdown-overlay.show { opacity: 1; pointer-events: all; }
    #countdown-num {
      font-size: 40vw;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      animation: countPop .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes countPop {
      from { transform: scale(1.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

<!-- ─── WELCOME ─── -->
<div id="screen-welcome" class="screen active">
  <div class="logo">JEU-TTS</div>
  <div class="subtitle">Reaction WOD · Crossfit Edition</div>

  <div class="input-wrap">
    <input id="blase-input" class="blase-input" type="text"
           placeholder="TON BLASE" maxlength="16" autocomplete="off"
           autocorrect="off" spellcheck="false" />
  </div>

  <button id="btn-start" class="btn-start">LET'S GO 🔥</button>

  <p class="rules">
    Tape sur l'icône dès qu'elle apparaît.<br>
    <span>+10 pts</span> par tap réussi ·
    <span>NO REP</span> si tu rates.<br>
    30 secondes · Maximum de points !
  </p>
</div>

<!-- ─── COUNTDOWN ─── -->
<div id="countdown-overlay">
  <div id="countdown-num">3</div>
</div>

<!-- ─── GAME ─── -->
<div id="screen-game" class="screen">
  <div id="game-area">
    <div class="target" id="target">🏋️</div>
    <div id="norep-overlay"><div id="norep-text">NO REP!</div></div>
  </div>
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-block">
      <div class="hud-label">Temps</div>
      <div class="hud-value" id="hud-time">30</div>
      <div id="hud-blase">PLAYER</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-block">
      <div class="hud-label">Tops</div>
      <div class="hud-value" id="hud-taps">0</div>
    </div>
  </div>
</div>

<!-- ─── RESULTS ─── -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <div class="result-tag">⚡ WOD TERMINÉ</div>
    <div class="result-name" id="res-name">ATHLETE</div>
    <div class="result-score-wrap">
      <div class="result-score" id="res-score">0</div>
      <div class="result-pts">PTS</div>
    </div>
  </div>

  <div class="lb-title">TOP 10 DES <span>BOSS</span></div>
  <div id="leaderboard"><div class="lb-loading">Chargement...</div></div>

  <button class="btn-play-again" id="btn-again">↩ REJOUER</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbb-aiF4tsijmfA_PQpukuimB6-aDBMqc",
  authDomain: "jeu-tts.firebaseapp.com",
  projectId: "jeu-tts",
  storageBucket: "jeu-tts.firebasestorage.app",
  messagingSenderId: "512763827046",
  appId: "1:512763827046:web:70cb196aca8f3639cdeea7"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ─── Audio ───────────────────────────────────────────────────────────────────
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, type, dur, vol = .3) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
  o.start(); o.stop(ctx.currentTime + dur);
}
const sfxGood = () => { beep(880, 'sine', .12, .35); setTimeout(() => beep(1200,'sine',.1,.25), 80); };
const sfxBad  = () => beep(110, 'sawtooth', .35, .4);

// ─── State ────────────────────────────────────────────────────────────────────
const MOVES   = ['🏋️','🏋️‍♂️','📦'];
const DURATION = 30;
let blase = '', score = 0, taps = 0, timeLeft = 0, timer = null;
let frozen = false, gameActive = false;
let unsubLb = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const screens   = { welcome: q('#screen-welcome'), game: q('#screen-game'), result: q('#screen-result') };
const target    = q('#target');
const gameArea  = q('#game-area');
const norepOl   = q('#norep-overlay');
const hudScore  = q('#hud-score');
const hudTime   = q('#hud-time');
const hudTaps   = q('#hud-taps');
const hudBlase  = q('#hud-blase');
const cdOverlay = q('#countdown-overlay');
const cdNum     = q('#countdown-num');
const lb        = q('#leaderboard');
function q(s) { return document.querySelector(s); }

// ─── Screen switching ─────────────────────────────────────────────────────────
function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => {
    el.classList.toggle('active', k === name);
  });
}

// ─── Welcome ──────────────────────────────────────────────────────────────────
q('#btn-start').addEventListener('click', () => {
  if (ctx.state === 'suspended') ctx.resume();
  const val = q('#blase-input').value.trim().toUpperCase();
  if (!val) { q('#blase-input').focus(); q('#blase-input').style.borderColor='#ff003c'; return; }
  blase = val;
  startCountdown();
});
q('#blase-input').addEventListener('input', () => { q('#blase-input').style.borderColor=''; });
q('#blase-input').addEventListener('keydown', e => { if (e.key === 'Enter') q('#btn-start').click(); });

// ─── Countdown ───────────────────────────────────────────────────────────────
async function startCountdown() {
  showScreen('game');
  cdOverlay.classList.add('show');
  for (let n = 3; n >= 1; n--) {
    cdNum.textContent = n;
    cdNum.style.animation = 'none';
    void cdNum.offsetWidth;
    cdNum.style.animation = 'countPop .5s cubic-bezier(.34,1.56,.64,1)';
    beep(440 + n * 80, 'sine', .18, .3);
    await sleep(900);
  }
  cdNum.textContent = 'GO!';
  cdNum.style.animation = 'none'; void cdNum.offsetWidth; cdNum.style.animation = 'countPop .4s ease';
  beep(1200, 'sine', .25, .45);
  await sleep(600);
  cdOverlay.classList.remove('show');
  startGame();
}

// ─── Game ─────────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; taps = 0; timeLeft = DURATION; frozen = false; gameActive = true;
  updateHUD();
  hudBlase.textContent = blase;
  hudTime.classList.remove('urgent');
  gameArea.classList.add('animating');
  placeTarget();
  timer = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  updateHUD();
  if (timeLeft <= 5) hudTime.classList.add('urgent');
  if (timeLeft <= 0) endGame();
}

function updateHUD() {
  hudScore.textContent = score;
  hudTime.textContent  = timeLeft;
  hudTaps.textContent  = taps;
}

function placeTarget() {
  const margin = 55; // px
  const areaW = gameArea.clientWidth;
  const areaH = gameArea.clientHeight;
  const x = margin + Math.random() * (areaW - margin * 2);
  const y = margin + Math.random() * (areaH - margin * 2);
  target.style.left = x + 'px';
  target.style.top  = y + 'px';
  target.textContent = MOVES[Math.floor(Math.random() * MOVES.length)];
  target.classList.remove('visible');
  void target.offsetWidth;
  target.classList.add('visible');
}

// Tap on target ✅
target.addEventListener('pointerdown', e => {
  if (!gameActive || frozen) return;
  e.stopPropagation();
  score += 10; taps++;
  updateHUD();
  sfxGood();
  placeTarget();
});

// Tap on background ❌
gameArea.addEventListener('pointerdown', e => {
  if (!gameActive || frozen || e.target === target) return;
  sfxBad();
  showNoRep();
});

async function showNoRep() {
  frozen = true;
  norepOl.classList.add('show');
  await sleep(2000);
  norepOl.classList.remove('show');
  frozen = false;
}

async function endGame() {
  clearInterval(timer);
  gameActive = false;
  gameArea.classList.remove('animating');
  target.classList.remove('visible');

  // Save score
  try {
    await addDoc(collection(db, 'scores'), {
      blase,
      score,
      taps,
      date: serverTimestamp()
    });
  } catch(e) { console.warn('Firestore save error', e); }

  // Show results
  q('#res-name').textContent  = blase;
  q('#res-score').textContent = score;
  showScreen('result');
  subscribeLeaderboard();
}

// ─── Leaderboard ─────────────────────────────────────────────────────────────
function subscribeLeaderboard() {
  if (unsubLb) unsubLb();
  lb.innerHTML = '<div class="lb-loading">Chargement...</div>';

  const q2 = query(collection(db, 'scores'), orderBy('score', 'desc'), limit(10));
  unsubLb = onSnapshot(q2, snap => {
    lb.innerHTML = '';
    if (snap.empty) {
      lb.innerHTML = '<div class="lb-loading">Aucun score encore.</div>';
      return;
    }
    snap.docs.forEach((doc, i) => {
      const d = doc.data();
      const isMine = d.blase === blase && d.score === score;
      const medals = ['🥇','🥈','🥉'];
      const rankLabel = i < 3 ? medals[i] : `${i+1}`;
      const row = document.createElement('div');
      row.className = `lb-row rank-${i+1}${isMine ? ' mine' : ''}`;
      row.style.animationDelay = `${i * 60}ms`;
      row.innerHTML = `
        <div class="lb-rank">${rankLabel}</div>
        <div class="lb-name">${esc(d.blase)}</div>
        <div class="lb-score">${d.score}<span class="lb-score-pts"> pts</span></div>
      `;
      lb.appendChild(row);
    });
  }, err => {
    lb.innerHTML = `<div class="lb-loading">Erreur: ${err.message}</div>`;
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Play again ───────────────────────────────────────────────────────────────
q('#btn-again').addEventListener('click', () => {
  if (unsubLb) { unsubLb(); unsubLb = null; }
  showScreen('welcome');
  q('#blase-input').value = blase;
});

// ─── Utils ───────────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
